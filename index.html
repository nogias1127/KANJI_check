<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f1ea" />
  <title>漢字チェック</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">iPad手書き練習</p>
      <h1>漢字チェック</h1>
    </div>
    <button id="settingsBtn" class="ghost-btn" type="button">漢字リスト</button>
  </header>

  <main class="layout">
    <section class="panel problem-panel">
      <div class="problem-head">
        <div>
          <p class="label">出題</p>
          <div id="currentKanji" class="current-kanji">がっき</div>
        </div>
        <div class="problem-meta">
          <span id="currentIndex">1 / 100</span>
          <span id="expectedStrokes">目安画数：未設定</span>
        </div>
      </div>

      <div class="controls-row">
        <button id="prevBtn" type="button">前へ</button>
        <button id="randomBtn" type="button">ランダム</button>
        <button id="nextBtn" type="button">次へ</button>
      </div>

      <div class="check-options">
        <label><input id="showGuide" type="checkbox" /> 薄いお手本を表示</label>
        <label><input id="strictMode" type="checkbox" /> きびしめ判定</label>
      </div>
    </section>

    <section class="panel writing-panel">
      <div class="canvas-wrap">
        <canvas id="guideCanvas" width="640" height="640" aria-hidden="true"></canvas>
        <canvas id="drawCanvas" width="640" height="640" aria-label="漢字を書く欄"></canvas>
      </div>
      <div class="canvas-actions">
        <button id="undoBtn" type="button">一画戻す</button>
        <button id="clearBtn" type="button">消す</button>
        <button id="judgeBtn" class="primary-btn" type="button">判定する</button>
      </div>
    </section>

    <section class="panel result-panel">
      <p class="label">判定結果</p>
      <div id="resultBadge" class="result-badge pending">まだ判定していません</div>
      <div id="scoreText" class="score-text">書いたあと「判定する」を押してください。</div>
      <ul id="feedbackList" class="feedback-list"></ul>
      <div class="progress-box">
        <p class="label">苦手リスト</p>
        <div id="weakList" class="weak-list">まだありません</div>
      </div>
    </section>
  </main>

  <dialog id="settingsDialog">
    <form method="dialog" class="settings-card">
      <h2>漢字リスト設定</h2>
      <p>1行につき「よみ,正解,画数」で入力できます。画数が不明なら「よみ,正解」だけでOKです。</p>
      <textarea id="kanjiInput" spellcheck="false"></textarea>
      <div class="dialog-actions">
        <button id="resetListBtn" value="reset" type="button">初期リストに戻す</button>
        <button value="cancel" type="submit">閉じる</button>
        <button id="saveListBtn" class="primary-btn" value="save" type="button">保存</button>
      </div>
    </form>
  </dialog>

  <footer class="footer">
    <p>判定は学習補助用です。先生の採点代替ではなく、書き直しの目安として使ってください。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
